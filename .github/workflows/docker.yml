name: Docker Build

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "**/Dockerfile"
      - "docker-compose.yml"
      - ".github/workflows/docker.yml"
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - "**/Dockerfile"
      - "docker-compose.yml"
      - ".github/workflows/docker.yml"

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-images:
    name: Build ${{ matrix.image }} image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: backend
            context: ./backend
            build-args: ""
          - image: frontend
            context: ./frontend
            build-args: |
              NEXT_PUBLIC_API_BASE_URL=http://localhost:8080
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Validate that the image builds. push: false — CI never publishes here;
      # publishing happens only on tagged releases (see release.yml).
      - name: Build ${{ matrix.image }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          push: false
          load: false
          build-args: ${{ matrix.build-args }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
