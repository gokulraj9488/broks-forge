name: E2E & API Tests

# Full-stack regression: boots the real stack with docker compose, then runs the Playwright
# browser suite and the Newman (Postman) API suite against it. Complements backend-ci.yml
# (JUnit + JaCoCo + Flyway) and frontend-ci.yml (lint + type-check + build).

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e-api:
    name: Playwright + Newman (docker compose stack)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate stack secrets (.env)
        run: |
          {
            echo "JWT_SECRET=$(openssl rand -base64 48)"
            echo "ENCRYPTION_KEY=$(openssl rand -base64 32)"
            # Deterministic tests: disable per-IP auth rate limiting and allow probing test hosts.
            echo "BROKSFORGE_SECURITY_RATE_LIMIT_ENABLED=false"
            echo "AGENT_HEALTH_ALLOW_PRIVATE_TARGETS=true"
          } >> .env

      - name: Build & start the stack
        run: docker compose up -d --build

      - name: Wait for the backend to be healthy
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/actuator/health | grep -q '"status":"UP"'; then
              echo "backend healthy"; exit 0
            fi
            sleep 5
          done
          echo "::error::backend did not become healthy"; docker compose logs backend; exit 1

      - name: Wait for the frontend to respond
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3000 >/dev/null; then echo "frontend up"; exit 0; fi
            sleep 5
          done
          echo "::error::frontend did not respond"; docker compose logs frontend; exit 1

      - name: Set up Node 20
        uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Playwright — install & run
        working-directory: e2e
        env:
          BASE_URL: http://localhost:3000
          API_URL: http://localhost:8080
          CI: "true"
        run: |
          npm ci
          npx playwright install --with-deps chromium
          npm test

      - name: API tests — Newman
        run: |
          npm install -g newman
          newman run docs/api-testing/broks-forge.postman_collection.json \
            -e docs/api-testing/broks-forge.postman_environment.json \
            --reporters cli,junit --reporter-junit-export newman-report.xml

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Newman report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: newman-report.xml
          if-no-files-found: ignore
          retention-days: 14

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down
        if: always()
        run: docker compose down -v
