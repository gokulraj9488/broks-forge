name: Dependency Review

on:
  pull_request:

concurrency:
  group: dependency-review-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # Lets the action post a summary comment on the PR.
  pull-requests: write

jobs:
  dependency-review:
    name: Review dependency changes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # dependency-review-action diffs the base ref's lockfile against head's;
          # the default shallow (depth-1) checkout only fetches the head commit,
          # so the action can't see the base commit to diff against and errors
          # out — unrelated to any actual vulnerability or license finding.
          fetch-depth: 0

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Fail the PR on newly introduced moderate-or-higher vulnerabilities.
          fail-on-severity: moderate
          comment-summary-in-pr: on-failure
          # Apache-2.0 project: flag copyleft licences that conflict with redistribution.
          deny-licenses: AGPL-1.0-or-later, AGPL-3.0-or-later, GPL-2.0-or-later, GPL-3.0-or-later
