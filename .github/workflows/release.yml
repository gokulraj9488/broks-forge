name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # 1. Build the release artifacts (backend JAR + frontend production build).
  # ---------------------------------------------------------------------------
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build backend JAR
        run: mvn -B -ntp -f backend/pom.xml clean verify

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
          NEXT_TELEMETRY_DISABLED: "1"
        run: |
          npm ci
          npm run build

      - name: Upload backend JAR
        uses: actions/upload-artifact@v4
        with:
          name: broks-forge-api-jar
          path: backend/target/broks-forge-api.jar
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 2. Create the GitHub Release. The body points to RELEASE_NOTES.md / CHANGELOG.md.
  # ---------------------------------------------------------------------------
  github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download backend JAR
        uses: actions/download-artifact@v4
        with:
          name: broks-forge-api-jar
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Brok's Forge ${{ github.ref_name }}
          body: |
            ## Brok's Forge ${{ github.ref_name }}

            See [RELEASE_NOTES.md](https://github.com/your-org/broks-forge/blob/${{ github.ref_name }}/RELEASE_NOTES.md)
            for the full announcement and upgrade steps, and
            [CHANGELOG.md](https://github.com/your-org/broks-forge/blob/${{ github.ref_name }}/CHANGELOG.md)
            for the detailed change log.
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            dist/broks-forge-api.jar

  # ---------------------------------------------------------------------------
  # 3. Build & push container images to GHCR.
  #    Guarded to the canonical org so forks never attempt to publish.
  # ---------------------------------------------------------------------------
  publish-images:
    name: Build & push ${{ matrix.image }} image
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.repository_owner == 'your-org' }}
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: backend
            context: ./backend
            build-args: ""
          - image: frontend
            context: ./frontend
            build-args: |
              NEXT_PUBLIC_API_BASE_URL=http://localhost:8080
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build & push ${{ matrix.image }} image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          push: true
          build-args: ${{ matrix.build-args }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
