version: 2

updates:
  # ---------------------------------------------------------------------------
  # Backend — Maven (Java 21 / Spring Boot)
  # ---------------------------------------------------------------------------
  - package-ecosystem: maven
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - backend
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: scope

  # ---------------------------------------------------------------------------
  # Frontend — npm (Next.js 15 / React 19)
  # ---------------------------------------------------------------------------
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - frontend
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: scope

  # ---------------------------------------------------------------------------
  # GitHub Actions workflows
  # ---------------------------------------------------------------------------
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "ci(deps)"
      include: scope

  # ---------------------------------------------------------------------------
  # Docker base images
  # ---------------------------------------------------------------------------
  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - docker
      - backend
    commit-message:
      prefix: "chore(deps)"
      include: scope

  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - docker
      - frontend
    commit-message:
      prefix: "chore(deps)"
      include: scope
