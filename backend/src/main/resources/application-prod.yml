# ===========================================================================
# Brok's Forge - Production profile   (SPRING_PROFILES_ACTIVE=prod)
# ---------------------------------------------------------------------------
# Hardened logging plus (optionally) the real SMTP e-mail transport.
# ===========================================================================

spring:
  # No defaults here (unlike the base application.yml, which falls back to localhost for
  # local `mvn spring-boot:run`). In production, a missing datasource variable must fail
  # fast at startup with a clear "could not resolve placeholder" error — not silently
  # connect to localhost and fail later with a confusing "connection refused" from Flyway.
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  # E-mail (SMTP) is OPTIONAL and off by default. `spring.mail.host`/`username`/`password`
  # are deliberately NOT declared here (not even with an empty default): Spring Boot maps
  # the SPRING_MAIL_HOST/SPRING_MAIL_USERNAME/SPRING_MAIL_PASSWORD env vars onto them
  # automatically via its own relaxed binding when you set them, so nothing needs to be
  # wired here for that to work.
  #
  # A prior version of this file bound `spring.mail.host: ${SPRING_MAIL_HOST}` with no
  # default. Spring Boot's MailSenderAutoConfiguration condition inspects
  # `spring.mail.host` at startup to decide whether to create a JavaMailSender bean; with
  # no default and no env var set, resolving that placeholder threw
  # "Could not resolve placeholder 'SPRING_MAIL_HOST'" *during condition evaluation*,
  # which Spring Boot surfaces as "Error processing condition on
  # ...MailSenderAutoConfiguration" — a fatal startup failure, not a mail-sending failure.
  # Simply not declaring the property lets the condition cleanly evaluate to "absent" and
  # boot proceeds; EmailServiceConfig then wires the console-logging EmailService instead
  # of SmtpEmailService. Set SPRING_MAIL_HOST/USERNAME/PASSWORD as real env vars to enable
  # real SMTP — nothing else needs to change.
  mail:
    port: ${SPRING_MAIL_PORT:587}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
        connecttimeout: 5000
        timeout: 5000
        writetimeout: 5000

# Production structured (ECS JSON) logging with correlation/request IDs as fields.
logging:
  level:
    root: INFO
    com.broksforge: INFO
    org.springframework.security: WARN
  structured:
    format:
      console: ${BROKSFORGE_LOG_STRUCTURED_FORMAT:ecs}

# Never expose health component details publicly in production.
management:
  endpoint:
    health:
      show-details: never
