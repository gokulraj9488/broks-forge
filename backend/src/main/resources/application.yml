# ===========================================================================
# Brok's Forge - Base application configuration
# ---------------------------------------------------------------------------
# Profile-specific overrides live in application-{profile}.yml
# Secrets are NEVER hardcoded here - they are read from the environment.
# ===========================================================================

spring:
  application:
    name: broks-forge-api

  profiles:
    # Local development is the default when no profile is supplied.
    default: dev

  servlet:
    multipart:
      # Dataset file uploads (CSV/JSON/XLSX/ZIP). Requests above this threshold are streamed
      # to a temp file on disk by the container rather than buffered in memory in full.
      max-file-size: 25MB
      max-request-size: 26MB
      file-size-threshold: 1MB

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/broksforge}
    username: ${SPRING_DATASOURCE_USERNAME:broksforge}
    password: ${SPRING_DATASOURCE_PASSWORD:broksforge}
    hikari:
      pool-name: broksforge-pool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
          # Batch bulk inserts (dataset items, evaluation runs/results) for throughput.
          batch_size: 50
        order_inserts: true
        order_updates: true
        format_sql: false
        # Map java.time.Instant to "timestamp with time zone" so schema
        # validation matches the Flyway-managed TIMESTAMPTZ columns.
        type:
          preferred_instant_jdbc_type: TIMESTAMP_UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      timeout: 2000ms
    web:
      pageable:
        # Enforce the documented page-size cap (docs/API_GUIDELINES.md) so a client
        # cannot request unbounded pages; Spring's own default cap (2000) is too high.
        max-page-size: 100
        default-page-size: 20

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

server:
  # Railway (and most PaaS hosts) inject PORT at runtime and require the app to bind to it;
  # Docker Compose/local dev has no PORT set, so this falls back to the usual 8080.
  port: ${PORT:8080}
  shutdown: graceful
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        # Prometheus endpoint is exposed but still ADMIN-guarded by SecurityConfig
        # (scrapers authenticate, or run on a private management network).
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
      # Kubernetes-style probes: liveness = process up; readiness = can serve
      # traffic (includes the database). A DB outage makes the pod NOT ready
      # (drained) without killing it.
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState, db
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true
  info:
    env:
      enabled: true

info:
  app:
    name: Brok's Forge
    description: The Engineering Platform for AI Agents.
    version: 1.0.0

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
  default-produces-media-type: application/json

# ---------------------------------------------------------------------------
# Application-specific configuration (custom namespace)
# ---------------------------------------------------------------------------
broksforge:
  app:
    public-url: ${BROKSFORGE_APP_PUBLIC_URL:http://localhost:3000}
  # ---------------------------------------------------------------------------
  # Transactional e-mail (branding only). SMTP host/port/credentials are Spring's
  # own spring.mail.* and are configured in the prod profile (application-prod.yml).
  # Development/CI use the console LoggingEmailService and need none of this.
  # ---------------------------------------------------------------------------
  mail:
    from-address: ${BROKSFORGE_MAIL_FROM_ADDRESS:no-reply@broksforge.dev}
    from-name: "${BROKSFORGE_MAIL_FROM_NAME:Brok's Forge}"
  security:
    jwt:
      # No default: production deployments MUST provide a strong secret.
      secret: ${BROKSFORGE_SECURITY_JWT_SECRET}
      issuer: ${BROKSFORGE_SECURITY_JWT_ISSUER:broks-forge}
      access-token-expiration-ms: ${BROKSFORGE_SECURITY_JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
      refresh-token-expiration-ms: ${BROKSFORGE_SECURITY_JWT_REFRESH_TOKEN_EXPIRATION_MS:2592000000}
    cors:
      allowed-origins: ${BROKSFORGE_SECURITY_CORS_ALLOWED_ORIGINS:http://localhost:3000}
      allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
      allowed-headers: "*"
      exposed-headers: Authorization,Link
      allow-credentials: true
      max-age: 3600
    api-key:
      # Prefix shown to users so keys are recognisable. The secret part is hashed.
      prefix: bf
    tokens:
      # Email verification link lifetime (default 24 hours)
      email-verification-expiration-ms: ${BROKSFORGE_SECURITY_TOKENS_EMAIL_VERIFICATION_EXPIRATION_MS:86400000}
      # Password reset link lifetime (default 1 hour)
      password-reset-expiration-ms: ${BROKSFORGE_SECURITY_TOKENS_PASSWORD_RESET_EXPIRATION_MS:3600000}
      # Password change confirmation link lifetime (legacy link flow; default 15 minutes)
      password-change-expiration-ms: ${BROKSFORGE_SECURITY_TOKENS_PASSWORD_CHANGE_EXPIRATION_MS:900000}
      # Password-change e-mail OTP lifetime (ADR 0017; default 5 minutes)
      password-change-otp-expiration-ms: ${BROKSFORGE_SECURITY_TOKENS_PASSWORD_CHANGE_OTP_EXPIRATION_MS:300000}
      # Single-use ticket lifetime after the OTP is verified (default 10 minutes)
      password-change-ticket-expiration-ms: ${BROKSFORGE_SECURITY_TOKENS_PASSWORD_CHANGE_TICKET_EXPIRATION_MS:600000}
    encryption:
      # AES-256-GCM key for encrypting agent credentials at rest.
      # No default: production deployments MUST provide a Base64 32-byte key.
      # Generate one with: openssl rand -base64 32
      secret: ${BROKSFORGE_SECURITY_ENCRYPTION_KEY}
      # Active key version, stamped onto ciphertext to support key rotation.
      key-version: ${BROKSFORGE_SECURITY_ENCRYPTION_KEY_VERSION:1}
    rate-limit:
      # Fixed-window, per-client-IP limit on the sensitive auth endpoints
      # (register, login, verify-email, forgot/reset-password, resend-verification).
      # Redis-backed so it holds across replicas; fails open if Redis is unavailable.
      enabled: ${BROKSFORGE_SECURITY_RATE_LIMIT_ENABLED:true}
      limit: ${BROKSFORGE_SECURITY_RATE_LIMIT_LIMIT:20}
      window-seconds: ${BROKSFORGE_SECURITY_RATE_LIMIT_WINDOW_SECONDS:60}
  # ---------------------------------------------------------------------------
  # Agent Registry (Phase 2)
  # ---------------------------------------------------------------------------
  agent:
    health:
      # Connect/read timeout for outbound agent health probes
      timeout-ms: ${BROKSFORGE_AGENT_HEALTH_TIMEOUT_MS:5000}
      # SSRF guard: whether the platform may probe private/loopback targets.
      # Disabled in production; enabled in the dev profile for local agents.
      allow-private-targets: ${BROKSFORGE_AGENT_HEALTH_ALLOW_PRIVATE_TARGETS:false}
      # Rolling window (days) used to compute availability percentage
      history-window-days: ${BROKSFORGE_AGENT_HEALTH_HISTORY_WINDOW_DAYS:30}
      # Number of recent checks returned in the health summary
      recent-limit: ${BROKSFORGE_AGENT_HEALTH_RECENT_LIMIT:20}
  # ---------------------------------------------------------------------------
  # Model invocation (Phase 3) — outbound calls to agent endpoints / providers
  # ---------------------------------------------------------------------------
  model:
    # Connect/read timeout for outbound model calls (agent endpoints).
    timeout-ms: ${BROKSFORGE_MODEL_TIMEOUT_MS:30000}
    # SSRF guard for model calls: false in production, true in dev for local agents.
    allow-private-targets: ${BROKSFORGE_MODEL_ALLOW_PRIVATE_TARGETS:false}
    # Defensive cap on stored output length per invocation.
    max-output-chars: ${BROKSFORGE_MODEL_MAX_OUTPUT_CHARS:100000}
  # ---------------------------------------------------------------------------
  # Per-provider defaults for outbound model invocations. Applied only when the caller
  # (job/profile generation parameters) didn't already specify max_tokens/max_completion_tokens —
  # never relies on whatever a provider does when the field is omitted (some fall back to the
  # full model context window, which can exhaust an account's credit balance on one request).
  # ---------------------------------------------------------------------------
  providers:
    default-max-tokens:
      openai: ${BROKSFORGE_PROVIDER_OPENAI_MAX_TOKENS:1024}
      groq: ${BROKSFORGE_PROVIDER_GROQ_MAX_TOKENS:1024}
      openrouter: ${BROKSFORGE_PROVIDER_OPENROUTER_MAX_TOKENS:1024}
      google: ${BROKSFORGE_PROVIDER_GOOGLE_MAX_TOKENS:1024}
      anthropic: ${BROKSFORGE_PROVIDER_ANTHROPIC_MAX_TOKENS:1024}
      mistral: ${BROKSFORGE_PROVIDER_MISTRAL_MAX_TOKENS:1024}
      deepseek: ${BROKSFORGE_PROVIDER_DEEPSEEK_MAX_TOKENS:1024}
      cohere: ${BROKSFORGE_PROVIDER_COHERE_MAX_TOKENS:1024}
      azure: ${BROKSFORGE_PROVIDER_AZURE_MAX_TOKENS:1024}
      ollama: ${BROKSFORGE_PROVIDER_OLLAMA_MAX_TOKENS:1024}
    # Used when the target provider isn't one of the keys above (unrecognised host, or a
    # provider not yet listed).
    fallback-max-tokens: ${BROKSFORGE_PROVIDER_FALLBACK_MAX_TOKENS:1024}
  # ---------------------------------------------------------------------------
  # Evaluation (Phase 3)
  # ---------------------------------------------------------------------------
  evaluation:
    # Largest dataset a single job may run synchronously on the request thread; larger
    # jobs are executed in the background (EvaluationBackgroundRunner).
    max-items-per-job: ${BROKSFORGE_EVALUATION_MAX_ITEMS_PER_JOB:500}
    # Page size used to stream dataset rows for a background job (bounds memory use
    # regardless of dataset size).
    batch-size: ${BROKSFORGE_EVALUATION_BATCH_SIZE:50}
    # Max concurrent row invocations across all background jobs.
    worker-concurrency: ${BROKSFORGE_EVALUATION_WORKER_CONCURRENCY:4}
    # Max evaluation jobs the background runner executes at once (queue priority governs
    # which queued job is picked up next when a slot frees up).
    max-concurrent-jobs: ${BROKSFORGE_EVALUATION_MAX_CONCURRENT_JOBS:2}
    # Max invocation attempts per row before it is recorded as failed.
    max-attempts: ${BROKSFORGE_EVALUATION_MAX_ATTEMPTS:3}
    retry-backoff-ms: ${BROKSFORGE_EVALUATION_RETRY_BACKOFF_MS:500}
    retry-backoff-max-ms: ${BROKSFORGE_EVALUATION_RETRY_BACKOFF_MAX_MS:15000}
    # A RUNNING job with no progress for this long is treated as stalled (e.g. after a
    # crash) and automatically resumed by the recovery scheduler.
    stall-after-ms: ${BROKSFORGE_EVALUATION_STALL_AFTER_MS:120000}
  # ---------------------------------------------------------------------------
  # AI Engineering Advisor (Phase 4) — heuristic thresholds for recommendations
  # ---------------------------------------------------------------------------
  advisor:
    # A prompt template longer than this (characters) is flagged as bloated.
    prompt-max-chars: ${BROKSFORGE_ADVISOR_PROMPT_MAX_CHARS:8000}
    # A template declaring more variables than this is flagged as complex.
    prompt-max-variables: ${BROKSFORGE_ADVISOR_PROMPT_MAX_VARIABLES:12}
    # Average run latency above this (ms) is flagged as a latency concern.
    latency-spike-ms: ${BROKSFORGE_ADVISOR_LATENCY_SPIKE_MS:12000}
    # Minimum comparable jobs before model/cost comparisons are emitted.
    min-samples-for-comparison: ${BROKSFORGE_ADVISOR_MIN_SAMPLES_FOR_COMPARISON:3}
    # Maximum failed runs the root-cause engine samples per job.
    failure-sample-size: ${BROKSFORGE_ADVISOR_FAILURE_SAMPLE_SIZE:50}

# ---------------------------------------------------------------------------
# Logging — include correlation/request IDs from MDC for traceability
# ---------------------------------------------------------------------------
logging:
  pattern:
    console: "%clr(%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX}){faint} %clr(%5p) %clr([%X{correlationId:-},%X{requestId:-}]){magenta} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n%wEx"
  level:
    # Outbound agent probes (connection test + health check): log the request/response at DEBUG.
    # Low volume (only on user-triggered checks) and the Authorization header is masked — safe to keep on.
    com.broksforge.modules.agent.service.CredentialConnectionTester: DEBUG
    com.broksforge.modules.agent.service.AgentHealthCheckExecutor: DEBUG
