# ===========================================================================
# Brok's Forge - Nginx reverse proxy for api.broksforge.gokul.quest
# ---------------------------------------------------------------------------
# Terminates TLS, proxies everything to the backend container (`backend:8080`
# on the shared `broksforge-net` Docker network), and redirects all plain HTTP
# to HTTPS. Loaded by the `nginx` service in docker-compose.prod.yml.
#
# Before this config's HTTPS server block can start, a certificate must exist
# at the paths below — see nginx/init-letsencrypt.sh for first-time bootstrap
# (the chicken-and-egg problem: Nginx won't start pointing at a cert that
# doesn't exist yet, and Certbot's HTTP-01 challenge needs Nginx running on
# port 80 to serve it).
# ===========================================================================

# WebSocket upgrade helper: Connection: upgrade when the client asks to
# upgrade, close otherwise. Required for the Upgrade/Connection headers below.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Upstream name (not a load-balanced pool here, just a stable alias) so the
# proxy_pass target reads clearly and is easy to repoint if the backend is
# ever split into multiple replicas behind this same Nginx.
upstream broksforge_backend {
    server backend:8080;
}

# ---------------------------------------------------------------------------
# HTTP (port 80): ACME HTTP-01 challenge passthrough + redirect everything
# else to HTTPS. Do NOT redirect /.well-known/acme-challenge/ — Certbot's
# renewal requests hit this path directly over plain HTTP.
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name api.broksforge.gokul.quest;

    # Nginx's own container healthcheck (docker-compose.prod.yml) — answered
    # locally without proxying to the backend, so Nginx's health is reported
    # independently of the backend's.
    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS (port 443): the real reverse proxy.
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.broksforge.gokul.quest;

    ssl_certificate     /etc/letsencrypt/live/api.broksforge.gokul.quest/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.broksforge.gokul.quest/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/api.broksforge.gokul.quest/chain.pem;

    # Modern TLS only; Let's Encrypt's recommended baseline.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ---------------------------------------------------------------------
    # Security headers. CSP is intentionally NOT set here — the backend's own
    # SecurityConfig already sets a strict CSP on its API responses, and
    # duplicating/diverging one at the proxy layer would be a second place to
    # keep in sync. The headers below are proxy-appropriate and additive.
    # ---------------------------------------------------------------------
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ---------------------------------------------------------------------
    # Gzip — the API is JSON-heavy; compress responses above a small floor.
    # ---------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 512;
    gzip_types application/json application/javascript text/plain text/css application/xml;

    # ---------------------------------------------------------------------
    # Upload limit. Mirrors the backend's own multipart cap (application.yml:
    # spring.servlet.multipart.max-request-size: 26MB, for dataset CSV/JSON/
    # XLSX/ZIP imports) plus headroom — Nginx must not reject a request the
    # backend would otherwise accept.
    # ---------------------------------------------------------------------
    client_max_body_size 30m;

    # ---------------------------------------------------------------------
    # Timeouts. Evaluation-related endpoints can run synchronously for
    # moderate datasets (see broksforge.evaluation.max-items-per-job) — a
    # short proxy timeout would sever a request the backend is still
    # legitimately processing. Large datasets already run via the background
    # executor and return immediately, so this is a ceiling for the
    # synchronous path, not the norm.
    # ---------------------------------------------------------------------
    proxy_connect_timeout 10s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;

    # Buffering tuned for typical JSON payloads; large responses spill to
    # temp files automatically rather than failing.
    proxy_buffering on;
    proxy_buffer_size 8k;
    proxy_buffers 8 8k;
    proxy_busy_buffers_size 16k;
    proxy_max_temp_file_size 1024m;

    location / {
        proxy_pass http://broksforge_backend;
        proxy_http_version 1.1;

        # WebSocket support (Upgrade/Connection pass-through). Brok's Forge
        # doesn't currently open a WebSocket endpoint, but this is here so a
        # future one (e.g. live evaluation-run progress) works without a
        # second round of Nginx changes.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }
}
